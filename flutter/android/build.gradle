ext.kotlin_version = '1.8.22'

plugins {
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Override outdated Kotlin language version settings of legacy dependencies to 1.8
    def configureKotlinOptions = { proj ->
        proj.tasks.all { task ->
            if (task.name.toLowerCase().contains("kotlin") || task.class.name.contains("KotlinCompile")) {
                try {
                    if (task.hasProperty('kotlinOptions')) {
                        def options = task.kotlinOptions
                        if (options != null) {
                            options.languageVersion = "1.8"
                            options.apiVersion = "1.8"
                        }
                    }
                } catch (Exception e) {
                    // Ignore
                }
                try {
                    if (task.hasProperty('compilerOptions')) {
                        def compOptions = task.compilerOptions
                        if (compOptions != null) {
                            if (compOptions.hasProperty('languageVersion') && compOptions.languageVersion.hasProperty('set')) {
                                def kotlinVersionClass = Class.forName("org.jetbrains.kotlin.gradle.dsl.KotlinVersion")
                                def ver1_8 = kotlinVersionClass.getField("KOTLIN_1_8").get(null)
                                compOptions.languageVersion.set(ver1_8)
                                compOptions.apiVersion.set(ver1_8)
                            }
                        }
                    }
                } catch (Exception e) {
                    // Ignore
                }
            }
        }
    }

    configureKotlinOptions(it)
    gradle.projectsEvaluated {
        configureKotlinOptions(it)
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
