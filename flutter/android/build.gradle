ext.kotlin_version = '1.8.22'

plugins {
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Override outdated Kotlin language version settings of legacy dependencies to 1.8
    def configureKotlinOptions = { proj ->
        proj.tasks.matching { it.class.name.contains("KotlinCompile") }.all { task ->
            try {
                if (task.hasProperty('kotlinOptions')) {
                    def options = task.kotlinOptions
                    if (options != null) {
                        if (options.hasProperty('languageVersion')) {
                            def langVer = options.languageVersion?.toString()
                            if (langVer == "1.4" || langVer == "1.5" || langVer == "1.6" || langVer == "1.7") {
                                options.languageVersion = "1.8"
                            }
                        }
                        if (options.hasProperty('apiVersion')) {
                            def apiVer = options.apiVersion?.toString()
                            if (apiVer == "1.4" || apiVer == "1.5" || apiVer == "1.6" || apiVer == "1.7") {
                                options.apiVersion = "1.8"
                            }
                        }
                    }
                }
            } catch (Exception e) {
                // Ignore
            }
        }
    }

    configureKotlinOptions(it)
    gradle.projectsEvaluated {
        configureKotlinOptions(it)
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
