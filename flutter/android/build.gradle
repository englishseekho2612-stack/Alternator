ext.kotlin_version = '1.8.22'

plugins {
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Override outdated Kotlin language version settings of legacy dependencies to 1.8
    tasks.matching { it.class.name.contains("KotlinCompile") }.configureEach {
        try {
            kotlinOptions {
                if (languageVersion == "1.4" || languageVersion == "1.5" || languageVersion == "1.6" || languageVersion == "1.7") {
                    languageVersion = "1.8"
                }
                if (apiVersion == "1.4" || apiVersion == "1.5" || apiVersion == "1.6" || apiVersion == "1.7") {
                    apiVersion = "1.8"
                }
            }
        } catch (Exception e) {
            // Safe fallback
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
