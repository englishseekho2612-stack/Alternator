<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Apps Alternator - Discover beautiful, highly optimized open source and privacy-focused alternatives to costly commercial software.">
  <meta name="keywords" content="open source, alternative finder, free software, privacy, self-hosted, figma alternative, photoshop alternative, secure search, sanvi ai">
  <meta name="author" content="Apps Alternator Team">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Apps Alternator">

  <!-- Favicon and PWA standard hooks -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Apps Alternator - Find Premium Open Source Alternatives</title>
  <link rel="manifest" href="manifest.json">

  <!-- High performance inline CSS styles to keep first contentful paint (FCP) under 100ms -->
  <style>
    body {
      background-color: #0b0f19;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #94a3b8;
    }
    .loading-container {
      text-align: center;
    }
    .loader {
      border: 3px solid #1e293b;
      border-top: 3px solid #0ea5e9;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      margin: 0 auto 16px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #f1f5f9;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .loading-subtitle {
      font-size: 11px;
      color: #64748b;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <!-- Perceived load speed enhancement loader -->
  <div class="loading-container">
    <div class="loader"></div>
    <div class="loading-title">Apps Alternator</div>
    <div class="loading-subtitle">Loading secure offline local directories...</div>
  </div>

  <noscript>
    <div style="text-align: center; padding: 40px; color: #f8fafc; background: #0f172a; border-radius: 12px; border: 1px solid #1e293b; max-width: 400px; margin: auto;">
      <h2 style="font-size: 18px; font-weight: bold; margin-bottom: 12px;">JavaScript Disabled</h2>
      <p style="font-size: 12px; color: #94a3b8; line-height: 1.6;">Apps Alternator requires JavaScript to run its local search engine and Sanvi AI interactions. Please enable JS in your browser settings to proceed.</p>
    </div>
  </noscript>

  <!-- Bootstraps Flutter Web Application -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
